apiVersion: mysql.asrk.dev/v1alpha1
kind: MySQL
metadata:
  name: ha-mysql
  namespace: default
spec:
  # pod-0 starts as primary; automatic failover may promote another pod.
  replicas: 3
  image: mysql:8.0
  storageSize: 5Gi
  database: app
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  # Automatic failover (default enabled when replicas > 1)
  failover:
    enabled: true
    unhealthySeconds: 30
# Clients:
#   writes -> Service ha-mysql-primary (or ha-mysql) — follows status.primaryPod
#   reads  -> Service ha-mysql-reads
# Topology DNS: <pod>.ha-mysql-headless.default.svc.cluster.local
