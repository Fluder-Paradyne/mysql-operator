apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mysqlclones.mysql.asrk.dev
spec:
  group: mysql.asrk.dev
  names:
    kind: MySQLClone
    listKind: MySQLCloneList
    plural: mysqlclones
    singular: mysqlclone
    shortNames: [myc]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - {name: Phase, type: string, jsonPath: .status.phase}
        - {name: Source, type: string, jsonPath: .spec.sourceMySQLName}
        - {name: Target, type: string, jsonPath: .spec.targetMySQLName}
        - {name: Age, type: date, jsonPath: .metadata.creationTimestamp}
      subresources: {status: {}}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: {type: string}
            kind: {type: string}
            metadata: {type: object}
            spec:
              type: object
              required: [sourceMySQLName, targetMySQLName]
              properties:
                sourceMySQLName: {type: string}
                targetMySQLName: {type: string}
                method: {type: string, enum: [ClonePlugin, Logical], default: ClonePlugin}
                image: {type: string}
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
