apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mysqls.mysql.asrk.dev
spec:
  group: mysql.asrk.dev
  names:
    kind: MySQL
    listKind: MySQLList
    plural: mysqls
    singular: mysql
    shortNames:
      - my
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Primary
          type: string
          jsonPath: .status.primaryPod
        - name: Mode
          type: string
          jsonPath: .status.mode
        - name: Replicating
          type: integer
          jsonPath: .status.replicating
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 5
                  default: 1
                  description: "1 = standalone; 2+ = primary (pod-0) + GTID replicas"
                image:
                  type: string
                  default: mysql:8.0
                storageSize:
                  type: string
                  default: 10Gi
                storageClassName:
                  type: string
                rootPasswordSecretRef:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                      default: password
                replicationPasswordSecretRef:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                      default: password
                database:
                  type: string
                port:
                  type: integer
                  format: int32
                  default: 3306

                pitr:
                  type: object
                  description: Point-in-time recovery (binlog archive to S3)
                  properties:
                    enabled:
                      type: boolean
                    binlogArchive:
                      type: object
                      properties:
                        schedule:
                          type: string
                        image:
                          type: string
                        awsCLIImage:
                          type: string
                        s3:
                          type: object
                          properties:
                            bucket:
                              type: string
                            region:
                              type: string
                            endpoint:
                              type: string
                            forcePathStyle:
                              type: boolean
                            prefix:
                              type: string
                            credentialsSecretRef:
                              type: object
                              properties:
                                name:
                                  type: string
                              required:
                                - name
                backup:
                  type: object
                  description: Scheduled logical backups (MySQLBackup CRs) with retention
                  properties:
                    enabled:
                      type: boolean
                    schedule:
                      type: string
                      description: "Cron schedule UTC (default 0 2 * * *)"
                    retentionDays:
                      type: integer
                      format: int32
                      minimum: 1
                      maximum: 3650
                      default: 30
                      description: Delete scheduled backups older than this many days (default 30)
                    suspend:
                      type: boolean
                    storageSize:
                      type: string
                    storageClassName:
                      type: string
                    s3:
                      type: object
                      properties:
                        bucket:
                          type: string
                        region:
                          type: string
                        endpoint:
                          type: string
                        forcePathStyle:
                          type: boolean
                        prefix:
                          type: string
                        skipPVC:
                          type: boolean
                        objectKey:
                          type: string
                        credentialsSecretRef:
                          type: object
                          properties:
                            name:
                              type: string
                          required:
                            - name
                failover:
                  type: object
                  description: Automatic primary promotion when the current primary is unhealthy (HA only)
                  properties:
                    enabled:
                      type: boolean
                      description: Defaults to true when omitted and replicas > 1
                    unhealthySeconds:
                      type: integer
                      format: int32
                      minimum: 5
                      maximum: 600
                      default: 30
                resources:
                  type: object
                  properties:
                    limits:
                      type: object
                      additionalProperties:
                        anyOf:
                          - type: integer
                          - type: string
                        x-kubernetes-int-or-string: true
                    requests:
                      type: object
                      additionalProperties:
                        anyOf:
                          - type: integer
                          - type: string
                        x-kubernetes-int-or-string: true
            status:
              type: object
              properties:
                phase:
                  type: string
                readyReplicas:
                  type: integer
                  format: int32
                desiredReplicas:
                  type: integer
                  format: int32
                mode:
                  type: string
                primaryPod:
                  type: string
                primaryService:
                  type: string
                readsService:
                  type: string
                headlessService:
                  type: string
                replicating:
                  type: integer
                  format: int32

                failoverInProgress:
                  type: boolean
                primaryUnhealthySince:
                  type: string
                  format: date-time
                lastFailoverTime:
                  type: string
                  format: date-time
                lastFailoverFrom:
                  type: string
                lastFailoverTo:
                  type: string
                rootSecretName:
                  type: string
                replicationSecretName:
                  type: string
                binlogArchivePrefix:
                  type: string
                binlogArchiveCronJob:
                  type: string
                lastScheduledBackup:
                  type: string
                lastScheduledBackupTime:
                  type: string
                  format: date-time
                backupRetentionDays:
                  type: integer
                  format: int32
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
